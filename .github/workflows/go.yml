name: Go

on:
  pull_request:
    branches:
    - master
  push:
    branches:
    - master

permissions:
  contents: read

jobs:
  build:
    name: Build Go ${{ matrix.go-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version: [1.26.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Vet
      run: go vet -tags gofuzz ./...

    - name: Build
      run: go build -tags gofuzz ./...

    - name: Test
      run: go test -tags gofuzz ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.26.x

    - name: Check formatting
      run: |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "The following files are not gofmt-formatted:"
          echo "$unformatted"
          exit 1
        fi

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: latest
