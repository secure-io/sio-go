version: "2"

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unparam
    - unused
  settings:
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
  exclusions:
    presets:
      - comments
    rules:
      - text: "don't use ALL_CAPS in Go names"
        linters:
          - revive

formatters:
  enable:
    - goimports
